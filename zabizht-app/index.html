<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Навигация ЗАБИЖТ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg, #4CAF50, #2196F3);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 15px;
}

h3 {
  margin-top: 0;
}

button {
  width: 100%;
  padding: 15px;
  margin: 6px 0;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}

/* Цвета кнопок по этажам */
.floor1 { background: #4CAF50; }
.floor2 { background: #2196F3; }
.floor3 { background: #9C27B0; }
.floor4 { background: #FF9800; }

.special { background: #f44336; }

#result {
  font-size: 18px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
📍 Навигация ЗАБИЖТ
</header>

<div class="container">

<div class="card">
  <h3 id="location">Определение...</h3>
</div>

<div class="card">
  <h3>Выберите кабинет:</h3>

  <!-- 1 этаж -->
  <button class="floor1" onclick="route('101')">1.01</button>
  <button class="floor1" onclick="route('105')">1.05</button>

  <!-- 2 этаж -->
  <button class="floor2" onclick="route('215')">2.15</button>
  <button class="floor2" onclick="route('222')">2.22</button>

  <!-- 3 этаж -->
  <button class="floor3" onclick="route('317')">3.17</button>
  <button class="floor3" onclick="route('317a')">3.17а</button>

  <!-- 4 этаж -->
  <button class="floor4" onclick="route('401')">4.01</button>
  <button class="floor4" onclick="route('420')">4.20</button>
  <button class="floor4" onclick="route('433')">4.33</button>
  <button class="floor4" onclick="route('438')">4.38</button>

  <!-- важные места -->
  <button class="special" onclick="route('canteen')">🍽 Столовая</button>
  <button class="special" onclick="route('toilet_m')">🚹 Мужской туалет</button>
  <button class="special" onclick="route('toilet_f')">🚺 Женский туалет</button>

</div>

<div class="card">
  <h3>Маршрут:</h3>
  <div id="result">Выберите пункт</div>
</div>

</div>

<script>

// определение положения (QR)
const params = new URLSearchParams(window.location.search);
const place = params.get("place");

let loc = "📍 Вход (1 этаж)";
if (place === "floor2") loc = "📍 2 этаж";
if (place === "floor3") loc = "📍 3 этаж";
if (place === "floor4") loc = "📍 4 этаж";

document.getElementById("location").innerText = loc;

// маршруты
function route(room) {

let t = "";

if (room === "101") t = "Идите прямо → кабинет слева";
if (room === "105") t = "Идите прямо → направо";

if (room === "215") t = "Поднимитесь на 2 этаж → направо";
if (room === "222") t = "Поднимитесь на 2 этаж → налево";

if (room === "317") t = "Поднимитесь на 3 этаж → налево";
if (room === "317a") t = "Поднимитесь на 3 этаж → направо";

if (room === "401") t = "Поднимитесь на 4 этаж → налево";
if (room === "420") t = "Поднимитесь на 4 этаж → конец коридора";
if (room === "433") t = "Поднимитесь на 4 этаж → середина коридора";
if (room === "438") t = "Поднимитесь на 4 этаж → конец коридора";

if (room === "canteen") t = "Спуститесь на 1 этаж → направо → столовая";

if (room === "toilet_m") t = "4 этаж → направо → 🚹";
if (room === "toilet_f") t = "4 этаж → направо → 🚺";

document.getElementById("result").innerText = t;
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
